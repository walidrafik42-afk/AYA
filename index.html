<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pour toi ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: linear-gradient(270deg, #ff758c, #ff7eb3);
  background-size: 400% 400%;
  animation: bg 8s ease infinite;
  font-family: Arial, sans-serif;
  overflow: hidden;
  text-align: center;
  color: white;
}

@keyframes bg {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

h1 {
  margin-top: 100px;
  font-size: 45px;
  animation: fadeIn 2s ease-in-out;
}

p {
  font-size: 22px;
  animation: fadeIn 4s ease-in-out;
}

button {
  margin-top: 30px;
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #ff4d6d;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* قلوب كيطيرو */
.heart {
  position: absolute;
  color: red;
  font-size: 20px;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% {
    transform: translateY(100vh);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
</style>

</head>

<body>

<h1>❤️ Pour toi ❤️</h1>

<p>
BENTY LWA3RA LFNIWNA LBOGOSSA 💖<br>
 ❤️
</p>

<button onclick="showMessage()">Clique ici 💌</button>

<script>
function showMessage() {
  alert("HHHHHH AJU NTSAL7O AJY❤️");
}

/* create hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
